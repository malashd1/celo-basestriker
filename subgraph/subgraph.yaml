specVersion: 1.0.0
schema:
  file: ./schema.graphql
features:
  - nonFatalErrors
dataSources:
  - kind: ethereum/contract
    name: GameRegistry
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"   # filled by deploy script
      abi: GameRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/registry.ts
      entities:
        - Player
        - LevelClear
        - ScoreSubmission
      abis:
        - name: GameRegistry
          file: ./abis/GameRegistry.json
      eventHandlers:
        - event: ScoreSubmitted(indexed address,uint16,uint64)
          handler: handleScoreSubmitted
        - event: LevelCleared(indexed address,uint16)
          handler: handleLevelCleared

  - kind: ethereum/contract
    name: RewardsDistributor
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RewardsDistributor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/rewards.ts
      entities:
        - Player
        - Claim
        - DailyAggregate
      abis:
        - name: RewardsDistributor
          file: ./abis/RewardsDistributor.json
      eventHandlers:
        - event: Claimed(indexed address,uint16,uint256)
          handler: handleClaimed

  - kind: ethereum/contract
    name: PaymentRouter
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: PaymentRouter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/payments.ts
      entities:
        - Purchase
        - Player
      abis:
        - name: PaymentRouter
          file: ./abis/PaymentRouter.json
      eventHandlers:
        - event: ItemPurchased(indexed address,indexed uint32,uint8,uint256)
          handler: handleItemPurchased
