<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Chisoft logo — pixel-art χ (chi, the Greek letter the brand is named for)
       rendered as 6x6 pixel blocks on a 64x64 grid. Cyan→purple gradient
       echoes the games' HUD palette. -->
  <defs>
    <linearGradient id="chiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#9d4dff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" ry="10" fill="#0a0014"/>
  <g fill="url(#chiGrad)">
    <!-- diagonal NW → SE -->
    <rect x="12" y="12" width="6" height="6"/>
    <rect x="18" y="18" width="6" height="6"/>
    <rect x="24" y="24" width="6" height="6"/>
    <rect x="30" y="30" width="6" height="6"/>
    <rect x="36" y="36" width="6" height="6"/>
    <rect x="42" y="42" width="6" height="6"/>
    <rect x="48" y="48" width="6" height="6"/>
    <!-- diagonal NE → SW (center cell shared with the other diagonal) -->
    <rect x="48" y="12" width="6" height="6"/>
    <rect x="42" y="18" width="6" height="6"/>
    <rect x="36" y="24" width="6" height="6"/>
    <rect x="24" y="36" width="6" height="6"/>
    <rect x="18" y="42" width="6" height="6"/>
    <rect x="12" y="48" width="6" height="6"/>
  </g>
</svg>
