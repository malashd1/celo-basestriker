services:
  backend:
    build: .
    image: basestriker-backend:latest
    container_name: basestriker-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8787
      DB_PATH: /data/basestriker.db
    ports:
      - "8787:8787"
    volumes:
      - basestriker-db:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  basestriker-db:
